<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Export</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="backdrop" id="backdrop"></div>

<aside class="drawer" id="drawer">

<div class="drawerEmoji">
<img src="assets/emojis.png">
</div>

<nav class="drawerMenu">
<a class="drawerBtn" href="index.html"><img src="assets/timer.png"></a>
<a class="drawerBtn" href="entries.html"><img src="assets/entries.png"></a>
<a class="drawerBtn" href="analytics.html"><img src="assets/analytics.png"></a>
<a class="drawerBtn" href="export.html"><img src="assets/export.png"></a>
</nav>

</aside>

<div class="container">

<details class="card" style="margin-top:10px;">
<summary style="cursor:pointer;font-size:24px;">GitHub Sync</summary>

<div class="field" style="margin-top:12px">

<label>GitHub Sync Token</label>

<input
id="tokenInput"
type="password"
placeholder="Paste token here once per device">

</div>

<div class="row" style="margin-top:10px">

<button class="btn" id="btnSaveToken">Save Token</button>

<button class="btn" id="btnPull">Pull Latest</button>

<button class="btn" id="btnPush">Push Now</button>

<button class="btn btnDanger" id="btnClearToken">Forget Token</button>

</div>

<p class="smallNote" id="syncNote" style="margin-top:10px"></p>

</details>

</div>

<h2 class="sectionTitle">Backups</h2>

<div class="row">

<button class="btn" id="btnDownloadJson">
Download JSON
</button>

<button class="btn" id="btnDownloadCsv">
Download CSV
</button>

</div>

<div class="row" style="margin-top:10px">

<input type="file" id="fileInput" accept="application/json">

<button class="btn" id="btnImport">
Import JSON
</button>

</div>

<p class="smallNote" id="backupNote" style="margin-top:10px"></p>

</div>

</div>

<script src="app.js"></script>

<script>

initDrawer()

const tokenInput=document.getElementById("tokenInput")
const btnSaveToken=document.getElementById("btnSaveToken")
const btnPull=document.getElementById("btnPull")
const btnPush=document.getElementById("btnPush")
const btnClearToken=document.getElementById("btnClearToken")
const syncNote=document.getElementById("syncNote")

const btnDownloadJson=document.getElementById("btnDownloadJson")
const btnDownloadCsv=document.getElementById("btnDownloadCsv")
const fileInput=document.getElementById("fileInput")
const btnImport=document.getElementById("btnImport")
const backupNote=document.getElementById("backupNote")

tokenInput.value=getGitHubToken()

function download(filename,text,mime="text/plain"){

const blob=new Blob([text],{type:mime})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download=filename
a.click()

URL.revokeObjectURL(url)

}

btnSaveToken.addEventListener("click",()=>{

setGitHubToken(tokenInput.value.trim())

syncNote.textContent="Token saved on this device"

})

btnClearToken.addEventListener("click",()=>{

clearGitHubToken()
tokenInput.value=""

syncNote.textContent="Token removed"

})

btnPull.addEventListener("click",async()=>{

try{

await pullFromGitHub()

syncNote.textContent="Pulled latest data"

}catch(e){

syncNote.textContent=e.message

}

})

btnPush.addEventListener("click",async()=>{

try{

await pushToGitHub()

syncNote.textContent="Pushed local data"

}catch(e){

syncNote.textContent=e.message

}

})

btnDownloadJson.addEventListener("click",()=>{

download(
"bead-tracker-backup.json",
JSON.stringify({
exported:new Date().toISOString(),
entries:loadEntries(),
tasks:getTasks()
},null,2),
"application/json"
)

})

btnDownloadCsv.addEventListener("click",()=>{

const entries=loadEntries()

const header=[
"id",
"date",
"order",
"task",
"start_time",
"end_time",
"duration_ms",
"bead_count"
].join(",")

const rows=entries.map(e=>[
e.id,
e.date,
e.order,
`"${e.task}"`,
e.start_time,
e.end_time,
e.duration_ms,
e.bead_count ?? 0
].join(","))

download(
"bead-tracker-entries.csv",
[header,...rows].join("\n"),
"text/csv"
)

})

btnImport.addEventListener("click",async()=>{

const file=fileInput.files?.[0]

if(!file){
backupNote.textContent="Select a JSON file first"
return
}

try{

const text=await file.text()
const data=JSON.parse(text)

const incomingEntries=Array.isArray(data)
?data
:(Array.isArray(data.entries)?data.entries:[])

saveEntries(
mergeEntries(loadEntries(),incomingEntries)
)

backupNote.textContent="Import successful"

}catch{

backupNote.textContent="Invalid file"

}

})

</script>

</body>
</html>
