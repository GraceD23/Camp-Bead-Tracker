<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SIDEBAR BACKDROP -->
  <div class="backdrop" id="backdrop" aria-hidden="true"></div>

  <!-- SIDEBAR -->
  <aside class="drawer" id="drawer" aria-label="Menu">
    <div class="drawerEmoji">
      <img src="assets/emojis.png" alt="">
    </div>

    <nav class="drawerMenu">
      <a class="drawerBtn" href="index.html"><img src="assets/timer.png" alt="Timer"></a>
      <a class="drawerBtn" href="entries.html"><img src="assets/entries.png" alt="Entries"></a>
      <a class="drawerBtn" href="analytics.html"><img src="assets/analytics.png" alt="Analytics"></a>
      <a class="drawerBtn" href="export.html"><img src="assets/export.png" alt="Export"></a>
    </nav>
  </aside>

  <!-- MAIN TIMER SCREEN -->
  <div class="timerScreen">

    <div class="container">
      <img src="assets/header.png" class="headerImage" alt="Camp Beads">
    </div>

    <div class="container">
      <div class="row">
        <div class="field">
          <div class="blockPink inlineBlock">
            <span class="prefix">Order:</span>
            <input id="orderInput" class="inlineField" type="text" placeholder="March" />
          </div>
        </div>

        <div class="field">
          <div class="blockPink inlineBlock">
            <span class="prefix">Task:</span>
            <select id="taskSelect" class="inlineField" aria-label="Task"></select>
          </div>
        </div>
      </div>
    </div>

    <div class="timerRow">
      <button class="flowerBtn" id="btnMenu" aria-label="Open menu">
        <img src="assets/flower.png" alt="">
      </button>

      <div id="timerDisplay" class="timerDisplay">00:00:00</div>
    </div>

    <div class="container" style="display:flex; justify-content:center;">
      <button class="startImgBtn" id="btnStart" aria-label="Start">
        <img src="assets/start.png" alt="Start">
      </button>
    </div>

    <div class="container">
      <div class="controlRow">
        <button class="controlBlock blockPink" id="btnPause">Pause</button>
        <button class="controlBlock blockPink" id="btnStop">Stop</button>
      </div>
    </div>

    <div class="container">
      <div class="todayBlock blockToday">
        <div class="todayTitle">Total Time Today:</div>
        <div id="todayTotal" class="todayValue">0 hours 0 minutes</div>
      </div>
    </div>

  </div>

  <!-- BEAD COUNT SHEET -->
  <div class="sheetBackdrop" id="sheetBackdrop" aria-hidden="true"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Bead count">
    <div class="sheetHandle"></div>
    <h2 class="sheetTitle">Bead Count</h2>

    <div class="sheetRow">
      <input id="beadCountInput" type="number" min="0" step="1" inputmode="numeric" placeholder="Enter bead count" />

      <div class="sheetBtns">
        <button class="btn" id="btnBeadSkip">Skip</button>
        <button class="btn" id="btnBeadSave">Save</button>
      </div>

      <p class="smallNote" id="sheetNote"></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    initDrawer();

    const DEFAULT_TASKS = [
      "Airbrush",
      "Starter Coat",
      "Base Coat",
      "Laser",
      "Detail (Side A)",
      "Detail (Side B)"
    ];

    const TASKS_REQUIRE_BEAD_COUNT = new Set([
      "Starter Coat",
      "Base Coat",
      "Laser",
      "Detail (Side A)",
      "Detail (Side B)"
    ]);

    const KEY_ENTRIES = "cbt_entries";
    const KEY_TASKS = "cbt_tasks";
    const KEY_SETTINGS = "cbt_settings";
    const KEY_ACTIVE_TIMER = "cbt_active_timer";

    const orderInput = document.getElementById("orderInput");
    const taskSelect = document.getElementById("taskSelect");
    const timerDisplay = document.getElementById("timerDisplay");
    const btnStart = document.getElementById("btnStart");
    const btnPause = document.getElementById("btnPause");
    const btnStop = document.getElementById("btnStop");
    const todayTotal = document.getElementById("todayTotal");

    const sheetBackdrop = document.getElementById("sheetBackdrop");
    const sheet = document.getElementById("sheet");
    const beadCountInput = document.getElementById("beadCountInput");
    const btnBeadSkip = document.getElementById("btnBeadSkip");
    const btnBeadSave = document.getElementById("btnBeadSave");

    let tickHandle = null;

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function nowDate() {
      return new Date();
    }

    function formatDateMMDDYYYY(d) {
      return `${pad2(d.getMonth() + 1)}/${pad2(d.getDate())}/${d.getFullYear()}`;
    }

    function formatTimeHHMMSS(d) {
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    }

    function msToHMS(ms) {
      const totalSec = Math.max(0, Math.floor((ms || 0) / 1000));
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
    }

    function msToHoursMinutesWords(ms) {
      const totalMin = Math.floor(Math.max(0, ms) / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return `${h} hours ${m} minutes`;
    }

    function safeInt(v, d = 0) {
      const n = parseInt(String(v ?? "").trim(), 10);
      return Number.isFinite(n) ? n : d;
    }

    function uuid() {
      return `e_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    }

    function uniq(arr) {
      return Array.from(new Set(arr));
    }

    function loadEntries() {
      try {
        return JSON.parse(localStorage.getItem(KEY_ENTRIES) || "[]");
      } catch {
        return [];
      }
    }

    function saveEntries(entries) {
      localStorage.setItem(KEY_ENTRIES, JSON.stringify(entries || []));
    }

    function getTasks() {
      try {
        const stored = JSON.parse(localStorage.getItem(KEY_TASKS) || "[]");
        return uniq([...DEFAULT_TASKS, ...stored.filter(Boolean).map(String)]);
      } catch {
        return [...DEFAULT_TASKS];
      }
    }

    function saveTasks(tasks) {
      const merged = uniq([...DEFAULT_TASKS, ...(tasks || []).filter(Boolean).map(String)]);
      localStorage.setItem(KEY_TASKS, JSON.stringify(merged));
    }

    function addTask(task) {
      const t = String(task || "").trim();
      if (!t) return getTasks();
      const tasks = getTasks();
      if (!tasks.includes(t)) tasks.push(t);
      saveTasks(tasks);
      return tasks;
    }

    function getSettings() {
      try {
        return JSON.parse(localStorage.getItem(KEY_SETTINGS) || "{}");
      } catch {
        return {};
      }
    }

    function saveSettings(obj) {
      localStorage.setItem(KEY_SETTINGS, JSON.stringify(obj || {}));
    }

    function getActiveTimer() {
      try {
        return JSON.parse(localStorage.getItem(KEY_ACTIVE_TIMER) || "null");
      } catch {
        return null;
      }
    }

    function setActiveTimer(t) {
      localStorage.setItem(KEY_ACTIVE_TIMER, JSON.stringify(t));
    }

    function clearActiveTimer() {
      localStorage.removeItem(KEY_ACTIVE_TIMER);
    }

    function currentElapsedMs(active) {
      if (!active) return 0;
      if (active.isPaused) return Number(active.elapsedMs || 0);
      return Number(active.elapsedMs || 0) + Math.max(0, Date.now() - Number(active.startedAtMs || 0));
    }

    function computeTodayMs(entries, includeActive = true) {
      const today = formatDateMMDDYYYY(new Date());
      let ms = (entries || [])
        .filter(e => e.date === today)
        .reduce((a, e) => a + Number(e.duration_ms || 0), 0);

      if (includeActive) {
        const active = getActiveTimer();
        if (active && active.sessionDate === today) {
          ms += currentElapsedMs(active);
        }
      }

      return ms;
    }

    function refreshToday() {
      todayTotal.textContent = msToHoursMinutesWords(computeTodayMs(loadEntries(), true));
    }

    function refreshTaskOptions(selected) {
      const tasks = getTasks();
      taskSelect.innerHTML = "";

      tasks.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = `Task: ${t}`;
        taskSelect.appendChild(opt);
      });

      const addOpt = document.createElement("option");
      addOpt.value = "__ADD__";
      addOpt.textContent = "Task: Add Task...";
      taskSelect.appendChild(addOpt);

      if (selected && tasks.includes(selected)) {
        taskSelect.value = selected;
      } else if (tasks.length) {
        taskSelect.value = tasks[0];
      }
    }

    function renderTimer() {
      const active = getActiveTimer();
      timerDisplay.textContent = active ? msToHMS(currentElapsedMs(active)) : "00:00:00";
      btnPause.textContent = active && active.isPaused ? "Resume" : "Pause";
      refreshToday();
    }

    function startTicker() {
      if (tickHandle) clearInterval(tickHandle);
      tickHandle = setInterval(renderTimer, 250);
    }

    function stopTicker() {
      if (tickHandle) clearInterval(tickHandle);
      tickHandle = null;
    }

    function openSheet() {
      sheetBackdrop.classList.add("open");
      sheet.classList.add("open");
      beadCountInput.value = "";
      beadCountInput.focus();
    }

    function closeSheet() {
      sheetBackdrop.classList.remove("open");
      sheet.classList.remove("open");
    }

    function startNewTimer(order, task) {
      const d = new Date();
      const active = {
        order: String(order || "").trim(),
        task: String(task || "").trim(),
        isPaused: false,
        elapsedMs: 0,
        startedAtMs: Date.now(),
        sessionStartMs: Date.now(),
        sessionDate: formatDateMMDDYYYY(d),
        startTime: formatTimeHHMMSS(d)
      };
      setActiveTimer(active);
      return active;
    }

    function pauseResumeTimer() {
      const active = getActiveTimer();
      if (!active) return null;

      if (active.isPaused) {
        active.isPaused = false;
        active.startedAtMs = Date.now();
      } else {
        active.elapsedMs = currentElapsedMs(active);
        active.isPaused = true;
      }

      setActiveTimer(active);
      return active;
    }

    function stopTimerAndSave(beadCount = 0) {
      const active = getActiveTimer();
      if (!active) return null;

      const endMs = Date.now();
      const elapsed = active.isPaused
        ? Number(active.elapsedMs || 0)
        : Number(active.elapsedMs || 0) + Math.max(0, endMs - Number(active.startedAtMs || endMs));

      const endDate = new Date(endMs);

      const entry = {
        id: uuid(),
        order: active.order,
        task: active.task,
        date: active.sessionDate || formatDateMMDDYYYY(endDate),
        start_time: active.startTime || formatTimeHHMMSS(new Date(active.sessionStartMs || endMs)),
        end_time: formatTimeHHMMSS(endDate),
        duration_ms: elapsed,
        bead_count: safeInt(beadCount, 0)
      };

      clearActiveTimer();

      const entries = loadEntries();
      entries.push(entry);
      saveEntries(entries);

      return entry;
    }

    taskSelect.addEventListener("change", () => {
      if (taskSelect.value === "__ADD__") {
        const v = prompt("New task name:");
        if (v && v.trim()) {
          addTask(v.trim());
          refreshTaskOptions(v.trim());
        } else {
          const s = getSettings();
          refreshTaskOptions(s.activeTask || getTasks()[0] || "");
        }
      }

      const s = getSettings();
      if (taskSelect.value !== "__ADD__") {
        s.activeTask = taskSelect.value;
        saveSettings(s);
      }
    });

    orderInput.addEventListener("change", () => {
      const v = String(orderInput.value || "").trim().replace(/\s+order$/i, "");
      orderInput.value = v;
      const s = getSettings();
      s.activeOrder = v;
      saveSettings(s);
    });

    btnStart.addEventListener("click", () => {
      let order = String(orderInput.value || "").trim().replace(/\s+order$/i, "");
      orderInput.value = order;
      const task = String(taskSelect.value || "").trim();

      if (!order) {
        alert("Enter an order first.");
        orderInput.focus();
        return;
      }

      if (!task || task === "__ADD__") {
        alert("Choose a task first.");
        taskSelect.focus();
        return;
      }

      const active = getActiveTimer();

      if (!active) {
        startNewTimer(order, task);
      } else if (active.isPaused) {
        pauseResumeTimer();
      }

      const s = getSettings();
      s.activeOrder = order;
      s.activeTask = task;
      saveSettings(s);

      startTicker();
      renderTimer();
    });

    btnPause.addEventListener("click", () => {
      const active = getActiveTimer();
      if (!active) return;
      pauseResumeTimer();
      renderTimer();
    });

    btnStop.addEventListener("click", () => {
      const active = getActiveTimer();
      if (!active) return;

      if (TASKS_REQUIRE_BEAD_COUNT.has(active.task)) {
        openSheet();
      } else {
        stopTimerAndSave(0);
        closeSheet();
        renderTimer();
      }
    });

    sheetBackdrop.addEventListener("click", closeSheet);

    btnBeadSkip.addEventListener("click", () => {
      stopTimerAndSave(0);
      closeSheet();
      renderTimer();
    });

    btnBeadSave.addEventListener("click", () => {
      stopTimerAndSave(safeInt(beadCountInput.value, 0));
      closeSheet();
      renderTimer();
    });

    const settings = getSettings();
    orderInput.value = (settings.activeOrder || "").replace(/\s+order$/i, "");
    refreshTaskOptions(settings.activeTask || "");
    if (getActiveTimer()) startTicker();
    renderTimer();

    setInterval(refreshToday, 60000);
  </script>
</body>
</html>
