<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- SIDEBAR BACKDROP -->
  <div class="backdrop" id="backdrop" aria-hidden="true"></div>

  <!-- SIDEBAR (PNG MENU) -->
  <aside class="drawer" id="drawer" aria-label="Menu">
    <div class="drawerEmoji">
      <img src="assets/emojis.png" alt="">
    </div>

    <nav class="drawerMenu">
      <a class="drawerBtn" href="index.html"><img src="assets/timer.png" alt="Timer"></a>
      <a class="drawerBtn" href="entries.html"><img src="assets/entries.png" alt="Entries"></a>
      <a class="drawerBtn" href="analytics.html"><img src="assets/analytics.png" alt="Analytics"></a>
      <a class="drawerBtn" href="export.html"><img src="assets/export.png" alt="Export"></a>
    </nav>
  </aside>

  <!-- TIMER SCREEN (fits iPhone) -->
  <div class="timerScreen">

    <!-- Header image -->
    <div class="container" style="width:min(520px,94vw);">
      <img src="assets/header.png" class="headerImage" alt="Camp Beads">
    </div>

    <!-- Order + Task row -->
    <div class="container" style="width:min(520px,94vw);">
      <div class="row">
        <div class="field">
          <select id="orderSelect" class="blockPink" aria-label="Order"></select>
        </div>

        <div class="field">
          <select id="taskSelect" class="blockPink" aria-label="Task"></select>
        </div>
      </div>
    </div>

    <!-- Timer row (flower + timer) -->
    <div class="container" style="width:min(520px,94vw); display:flex; align-items:center; justify-content:center; gap:14px;">
      <button class="btn" id="btnMenu" aria-label="Open menu" style="padding:0; border:none; background:transparent;">
        <img src="assets/flower.png" alt="Menu" style="display:block; width:64px; height:auto;">
      </button>

      <div id="timerDisplay" class="timerDisplay" style="font-size: clamp(38px, 10vw, 56px); font-weight: 900;">
        00:00:00
      </div>
    </div>

    <!-- Start button (image button) -->
    <div class="container" style="width:min(520px,94vw); display:flex; justify-content:center;">
      <button class="startImgBtn" id="btnStart" aria-label="Start" style="border:none; background:transparent; padding:0;">
        <img src="assets/start.png" alt="Start">
      </button>
    </div>

    <!-- Pause / Stop -->
    <div class="container" style="width:min(520px,94vw);">
      <div class="row">
        <button class="btn blockPink controlBlock" id="btnPause" style="width:100%; border:none;">Pause</button>
        <button class="btn blockPink controlBlock" id="btnStop" style="width:100%; border:none;">Stop</button>
      </div>
    </div>

    <!-- Total time today -->
    <div class="container" style="width:min(520px,94vw);">
      <div class="blockToday todayBlock" style="border-radius:18px; padding:12px 16px; text-align:center;">
        <div class="todayTitle" style="font-size:24px; font-weight:900;">Total Time Today:</div>
        <div id="todayTotal" class="todayValue" style="font-size:24px; font-weight:900;">0 hours 0 minutes</div>
      </div>
    </div>

  </div>

  <!-- Bead Count Sheet (used when Stop is pressed for certain tasks) -->
  <div class="sheetBackdrop" id="sheetBackdrop" aria-hidden="true"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Bead count">
    <div class="sheetHandle"></div>
    <h2 class="sheetTitle">Bead Count</h2>

    <div class="sheetRow">
      <input id="beadCountInput" type="number" min="0" step="1" inputmode="numeric" placeholder="Enter bead count" />

      <div class="sheetBtns">
        <button class="btn" id="btnBeadSkip">Skip</button>
        <button class="btn" id="btnBeadSave">Save</button>
      </div>

      <p class="smallNote" id="sheetNote"></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Drawer
    if (typeof initDrawer === "function") initDrawer();

    // ---- Task list ----
    const TASKS_FALLBACK = [
      "Airbrush","Starter Coat","Base Coat","Laser","Detail (Side A)","Detail (Side B)"
    ];
    const TASKS_LIST = (typeof TASKS !== "undefined" && Array.isArray(TASKS) && TASKS.length)
      ? TASKS
      : TASKS_FALLBACK;

    // Tasks that require bead count prompt
    const BEAD_TASKS = new Set(["Starter Coat","Base Coat","Laser","Detail (Side A)","Detail (Side B)"]);

    // ---- Storage helpers (use app.js if available) ----
    function loadEntriesSafe(){
      if (typeof loadEntries === "function") return loadEntries();
      try{
        const raw = localStorage.getItem("cbt_entries");
        return raw ? JSON.parse(raw) : [];
      }catch(e){ return []; }
    }

    function saveEntriesSafe(entries){
      if (typeof saveEntries === "function") return saveEntries(entries);
      localStorage.setItem("cbt_entries", JSON.stringify(entries));
    }

    function loadSettings(){
      try{
        const raw = localStorage.getItem("cbt_settings");
        return raw ? JSON.parse(raw) : {};
      }catch(e){ return {}; }
    }

    function saveSettings(obj){
      localStorage.setItem("cbt_settings", JSON.stringify(obj || {}));
    }

    // ---- DOM ----
    const orderSelect = document.getElementById("orderSelect");
    const taskSelect  = document.getElementById("taskSelect");
    const timerDisplay = document.getElementById("timerDisplay");

    const btnStart = document.getElementById("btnStart");
    const btnPause = document.getElementById("btnPause");
    const btnStop  = document.getElementById("btnStop");

    const todayTotal = document.getElementById("todayTotal");

    // Bead sheet
    const sheetBackdrop = document.getElementById("sheetBackdrop");
    const sheet = document.getElementById("sheet");
    const beadCountInput = document.getElementById("beadCountInput");
    const btnBeadSkip = document.getElementById("btnBeadSkip");
    const btnBeadSave = document.getElementById("btnBeadSave");
    const sheetNote = document.getElementById("sheetNote");

    // ---- Utilities ----
    function pad2(n){ return String(n).padStart(2,"0"); }

    function nowHMS(){
      const d = new Date();
      return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    }

    function formatMMDDYYYY(d){
      return `${pad2(d.getMonth()+1)}/${pad2(d.getDate())}/${d.getFullYear()}`;
    }

    function msToHMS(ms){
      ms = Math.max(0, Number(ms||0));
      const s = Math.floor(ms/1000);
      const hh = pad2(Math.floor(s/3600));
      const mm = pad2(Math.floor((s%3600)/60));
      const ss = pad2(s%60);
      return `${hh}:${mm}:${ss}`;
    }

    function msToHoursMinutes(ms){
      const totalMin = Math.floor(Math.max(0, ms)/60000);
      const h = Math.floor(totalMin/60);
      const m = totalMin % 60;
      return {h,m};
    }

    function todayKey(){
      return formatMMDDYYYY(new Date());
    }

    function computeTodayTotal(entries){
      const key = todayKey();
      const ms = (entries||[])
        .filter(e => e && e.date === key)
        .reduce((a,e)=>a + Number(e.duration_ms||0), 0);
      return ms;
    }

    function refreshToday(){
      const ms = computeTodayTotal(loadEntriesSafe());
      const hm = msToHoursMinutes(ms);
      todayTotal.textContent = `${hm.h} hours ${hm.m} minutes`;
    }

    // ---- Orders list (remember last order) ----
    function uniq(arr){ return Array.from(new Set(arr)); }

    function buildOrderOptions(){
      const entries = loadEntriesSafe();
      const saved = loadSettings();

      // collect previous orders
      const orders = uniq(
        entries.map(e => String(e.order||"").trim()).filter(Boolean)
      ).sort((a,b)=>a.localeCompare(b));

      // If none exist yet, provide common months as starter options
      const monthDefaults = [
        "January","February","March","April","May","June","July","August","September","October","November","December"
      ];

      const all = orders.length ? orders : monthDefaults;

      orderSelect.innerHTML = "";
      all.forEach(o=>{
        const opt = document.createElement("option");
        opt.value = o;
        opt.textContent = `Order: ${o}`;
        orderSelect.appendChild(opt);
      });

      // restore last order if possible
      if (saved && saved.activeOrder && all.includes(saved.activeOrder)){
        orderSelect.value = saved.activeOrder;
      }else{
        orderSelect.value = all[0];
      }
    }

    function buildTaskOptions(){
      const saved = loadSettings();

      taskSelect.innerHTML = "";
      TASKS_LIST.forEach(t=>{
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = `Task: ${t}`;
        taskSelect.appendChild(opt);
      });

      if (saved && saved.activeTask && TASKS_LIST.includes(saved.activeTask)){
        taskSelect.value = saved.activeTask;
      }else{
        taskSelect.value = TASKS_LIST[0] || "";
      }
    }

    orderSelect.addEventListener("change", ()=>{
      const s = loadSettings();
      s.activeOrder = orderSelect.value;
      saveSettings(s);
    });

    taskSelect.addEventListener("change", ()=>{
      const s = loadSettings();
      s.activeTask = taskSelect.value;
      saveSettings(s);
    });

    // ---- Timer state ----
    let running = false;
    let paused = false;

    let startEpoch = null;      // ms since epoch
    let elapsedMs = 0;          // accumulated while paused

    let tickHandle = null;

    function renderTimer(){
      const ms = elapsedMs + (running && !paused ? (Date.now() - startEpoch) : 0);
      timerDisplay.textContent = msToHMS(ms);
    }

    function startTimer(){
      if (running && !paused) return;

      if (!running){
        running = true;
        paused = false;
        elapsedMs = 0;
        startEpoch = Date.now();
        sessionStartHMS = nowHMS();
        sessionDate = formatMMDDYYYY(new Date());
      }else{
        // resume
        paused = false;
        startEpoch = Date.now();
      }

      if (tickHandle) clearInterval(tickHandle);
      tickHandle = setInterval(renderTimer, 250);
      renderTimer();
    }

    function pauseTimer(){
      if (!running) return;

      if (!paused){
        // pause
        elapsedMs += (Date.now() - startEpoch);
        paused = true;
      }else{
        // resume
        paused = false;
        startEpoch = Date.now();
      }
      renderTimer();
    }

    // session metadata
    let sessionStartHMS = "";
    let sessionDate = "";
    let pendingStopEntry = null;

    function openBeadSheet(entry){
      pendingStopEntry = entry;
      sheetNote.textContent = "";
      beadCountInput.value = "";
      sheetBackdrop.classList.add("open");
      sheet.classList.add("open");
    }

    function closeBeadSheet(){
      pendingStopEntry = null;
      sheetBackdrop.classList.remove("open");
      sheet.classList.remove("open");
    }

    sheetBackdrop.addEventListener("click", closeBeadSheet);

    function commitEntry(entry){
      const entries = loadEntriesSafe();

      // ensure id
      if (!entry.id){
        entry.id = `${Date.now()}_${Math.random().toString(16).slice(2)}`;
      }

      entries.push(entry);
      saveEntriesSafe(entries);

      refreshToday();
    }

    function stopTimer(){
      if (!running) return;

      // finalize elapsed
      if (!paused){
        elapsedMs += (Date.now() - startEpoch);
      }

      const endHMS = nowHMS();
      const order = orderSelect.value;
      const task = taskSelect.value;

      const entry = {
        id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
        date: sessionDate || formatMMDDYYYY(new Date()),
        order,
        task,
        start_time: sessionStartHMS || nowHMS(),
        end_time: endHMS,
        duration_ms: elapsedMs,
        bead_count: 0
      };

      // reset timer state immediately (UI)
      running = false;
      paused = false;
      startEpoch = null;
      elapsedMs = 0;
      if (tickHandle) clearInterval(tickHandle);
      tickHandle = null;
      renderTimer();

      // bead count prompt if needed
      if (BEAD_TASKS.has(task)){
        openBeadSheet(entry);
      }else{
        commitEntry(entry);
      }
    }

    // Bead sheet buttons
    btnBeadSkip.addEventListener("click", ()=>{
      if (!pendingStopEntry) return;
      pendingStopEntry.bead_count = 0;
      commitEntry(pendingStopEntry);
      closeBeadSheet();
    });

    btnBeadSave.addEventListener("click", ()=>{
      if (!pendingStopEntry) return;
      const n = parseInt(String(beadCountInput.value||"0"), 10);
      pendingStopEntry.bead_count = Number.isFinite(n) && n >= 0 ? n : 0;
      commitEntry(pendingStopEntry);
      closeBeadSheet();
    });

    // Buttons
    btnStart.addEventListener("click", startTimer);
    btnPause.addEventListener("click", pauseTimer);
    btnStop.addEventListener("click", stopTimer);

    // Initialize
    buildOrderOptions();
    buildTaskOptions();
    renderTimer();
    refreshToday();

    // Reset today at midnight (best effort)
    setInterval(()=>{
      refreshToday();
    }, 60 * 1000);
  </script>

</body>
</html>
