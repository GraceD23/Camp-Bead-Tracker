<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timer</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ---------------------------
       Timer page layout (no scroll)
       --------------------------- */
    body{
      padding: 10px;
      overflow: hidden; /* no page scroll */
    }

    .timerScreen{
      height: 100svh; /* iPhone-safe viewport */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    /* Header image */
    .headerImage{
      width: min(92vw, 860px);
      height: auto;
      display: block;
      margin-top: 6px;
    }

    /* Order / Task blocks row (mockup-style) */
    .orderTaskRow{
      width: min(92vw, 860px);
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    /* Make them look like your rectangles */
    .blockField{
      flex: 1;
      max-width: 420px;
      height: 56px;               /* mockup-like height */
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 16px;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
    }

    .blockLabel{
      font-weight: 900;
      font-size: 22px;
      line-height: 1;
      white-space: nowrap;
    }

    /* Make the input/select look like plain text inside the block */
    .inlineField{
      flex: 1;
      min-width: 0;
      border: none !important;
      outline: none !important;
      background: transparent !important;
      padding: 0 !important;
      margin: 0 !important;
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      color: inherit; /* uses block text color */
      appearance: none;
      -webkit-appearance: none;
    }

    /* Timer row: flower - timer - (optional heart later) */
    .timerRow{
      width: min(92vw, 860px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 2px;
    }

    /* Flower menu button is HERE (not absolute), so it won't overlap */
    .flowerBtn{
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .flowerBtn img{
      width: 78px; /* tweak if you want bigger/smaller */
      height: auto;
      display: block;
    }

    .timerDisplay{
      font-size: clamp(40px, 7vw, 56px);
      font-weight: 950;
      line-height: 1;
      text-align: center;
      min-width: 180px;
    }

    /* Start image button */
    .startImgBtn{
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }
    .startImgBtn img{
      width: min(520px, 78vw);
      height: auto;
      display: block;
    }

    /* Pause/Stop blocks row */
    .controlsRow{
      width: min(92vw, 860px);
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: -2px;
    }

    .controlBlock{
      width: min(44vw, 360px);
      height: 56px;              /* same height as order/task */
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      cursor: pointer;
      font-size: 24px;
      font-weight: 950;
      line-height: 1;
    }
    .controlBlock:active{ transform: translateY(1px); }

    /* Today summary block (bigger, like mockup) */
    .todayBlock{
      width: min(92vw, 860px);
      border-radius: 18px;
      padding: 12px 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      text-align: center;
    }
    .todayTitle{
      font-size: 24px;
      font-weight: 950;
      line-height: 1.05;
      margin-bottom: 6px;
    }
    .todayValue{
      font-size: 24px;
      font-weight: 950;
      line-height: 1.05;
    }

    /* Hide the old “recent sessions” section on the timer page to prevent scrolling.
       You can add it back later in a different page if you want. */
    .hideOnTimerPage{ display:none; }

    /* Slightly tighter spacing on very small screens */
    @media (max-width: 390px){
      .blockField{ height: 52px; }
      .controlBlock{ height: 52px; font-size: 22px; }
      .flowerBtn img{ width: 70px; }
    }
  </style>
</head>

<body>

<!-- SIDEBAR BACKDROP -->
<div class="backdrop" id="backdrop"></div>

<!-- SIDEBAR -->
<aside class="drawer" id="drawer">

  <div class="drawerEmoji">
    <img src="assets/emojis.png" alt="">
  </div>

  <nav class="drawerMenu">
    <a class="drawerBtn" href="index.html">
      <img src="assets/timer.png" alt="Timer">
    </a>

    <a class="drawerBtn" href="entries.html">
      <img src="assets/entries.png" alt="Entries">
    </a>

    <a class="drawerBtn" href="analytics.html">
      <img src="assets/analytics.png" alt="Analytics">
    </a>

    <a class="drawerBtn" href="export.html">
      <img src="assets/export.png" alt="Export">
    </a>

<!-- EVERYTHING ELSE ON THE PAGE -->
<div class="timerScreen">


</div>

</body>
  <div class="timerScreen">

    <!-- HEADER -->
    <img src="assets/header.png" class="headerImage" alt="Camp Beads">

    <!-- Drawer (keep these IDs for initDrawer/app.js) -->
    <div class="backdrop" id="backdrop" aria-hidden="true"></div>
    <aside class="drawer" id="drawer" aria-label="Menu">
      <a href="index.html">Timer</a>
      <a href="entries.html">Entries</a>
      <a href="analytics.html">Analytics</a>
      <a href="export.html">Export / Backup</a>
    </aside>

    <!-- ORDER + TASK blocks (one line each) -->
    <div class="orderTaskRow">
      <div class="blockPink blockField">
        <span class="blockLabel">Order:</span>
        <input id="orderInput" class="inlineField" type="text" placeholder="March" />
      </div>

      <div class="blockPink blockField">
        <span class="blockLabel">Task:</span>
        <select id="taskSelect" class="inlineField">
          <option value="">—</option>
        </select>
      </div>
    </div>

    <!-- TIMER ROW (flower opens menu) -->
    <div class="timerRow">
      <button id="btnMenu" class="flowerBtn" aria-label="Open menu">
        <img src="assets/flower.png" alt="">
      </button>

      <div id="timerDisplay" class="timerDisplay">00:00:00</div>

      <!-- If you later add heart.png, we can put it here -->
      <!-- <img src="assets/heart.png" style="width:78px;height:auto;display:block;" alt=""> -->
    </div>

    <!-- START BUTTON -->
    <button id="btnStart" class="startImgBtn" aria-label="Start timer">
      <img src="assets/start.png" alt="Start">
    </button>

    <!-- PAUSE / STOP blocks -->
    <div class="controlsRow">
      <button id="btnPause" class="blockPink controlBlock">Pause</button>
      <button id="btnStop" class="blockPink controlBlock">Stop</button>
    </div>

    <!-- TODAY SUMMARY (ONLY this text + value, with colon) -->
    <div class="blockToday todayBlock">
      <div class="todayTitle">Total Time Today:</div>
      <div class="todayValue" id="todayTotal">0 hours 0 minutes</div>
    </div>

    <!-- Keep status line (hidden visually unless you want it) -->
    <div id="statusLine" class="statusLine" style="min-height:0; height:0; overflow:hidden;"></div>

    <!-- Keep these elements in DOM but hidden to prevent scroll -->
    <div class="hideOnTimerPage">
      <div id="todayNote"></div>
      <div id="recentList"></div>
    </div>

  </div>

  <!-- Bead Count slide-up sheet (KEEP ids) -->
  <div class="sheetBackdrop" id="sheetBackdrop" aria-hidden="true"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Bead count">
    <div class="sheetHandle"></div>
    <h2 class="sheetTitle">Bead Count</h2>
    <div class="sheetRow">
      <input id="beadCountInput" type="number" min="0" step="1" inputmode="numeric" placeholder="0" />
      <div class="smallNote" id="beadCountHint">Enter bead count for this session.</div>
      <div class="sheetBtns">
        <button class="btn" id="btnBeadSave">Save</button>
        <button class="btn" id="btnBeadSkip">Skip (0)</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    initDrawer();

    // Fill task dropdown
    const taskSelect = document.getElementById("taskSelect");
    TASKS.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      taskSelect.appendChild(opt);
    });

    // Order persistence
    const orderInput = document.getElementById("orderInput");
    orderInput.value = getCurrentOrder();

    // Display rule: if user typed "March Order", show/store exactly what they typed.
    // You asked "March" not "March Order" — easiest is: you enter "March".
    // (If you want auto-strip "order" from the end, tell me and I’ll add it.)
    orderInput.addEventListener("change", () => {
      setCurrentOrder(orderInput.value);
      refreshTodayOnly();
    });

    // Last task persistence
    const lastTask = getLastTask();
    if (lastTask && TASKS.includes(lastTask)) taskSelect.value = lastTask;
    taskSelect.addEventListener("change", () => setLastTask(taskSelect.value));

    // Timer state
    let tick = null;
    let isRunning = false;
    let isPaused = false;
    let startEpochMs = null;
    let pausedAccumMs = 0;
    let pauseStartMs = null;
    let pendingStop = null;

    const timerDisplay = document.getElementById("timerDisplay");
    const btnStart = document.getElementById("btnStart");
    const btnPause = document.getElementById("btnPause");
    const btnStop = document.getElementById("btnStop");
    const statusLine = document.getElementById("statusLine");

    const sheetBackdrop = document.getElementById("sheetBackdrop");
    const sheet = document.getElementById("sheet");
    const beadCountInput = document.getElementById("beadCountInput");
    const btnBeadSave = document.getElementById("btnBeadSave");
    const btnBeadSkip = document.getElementById("btnBeadSkip");

    function elapsedMsNow(){
      if (!startEpochMs) return 0;
      const now = Date.now();
      const base = now - startEpochMs - pausedAccumMs;
      if (isPaused && pauseStartMs){
        return (pauseStartMs - startEpochMs - pausedAccumMs);
      }
      return Math.max(0, base);
    }

    function renderTimer(){
      timerDisplay.textContent = msToHMS(elapsedMsNow());
    }

    function startTicker(){
      if (tick) clearInterval(tick);
      tick = setInterval(renderTimer, 250);
    }

    function stopTicker(){
      if (tick) clearInterval(tick);
      tick = null;
    }

    function setStatus(msg){
      // kept but hidden; useful for debugging
      statusLine.textContent = msg || "";
    }

    function ensureCanStart(){
      const order = String(orderInput.value || "").trim();
      const task = String(taskSelect.value || "").trim();
      if (!order){ setStatus("Set an Order first."); orderInput.focus(); return false; }
      if (!task){ setStatus("Select a Task first."); taskSelect.focus(); return false; }
      return true;
    }

    function openSheet(){
      sheetBackdrop.classList.add("open");
      sheet.classList.add("open");
      beadCountInput.value = "";
      beadCountInput.focus();
    }

    function closeSheet(){
      sheetBackdrop.classList.remove("open");
      sheet.classList.remove("open");
    }

    function commitPendingWithBeads(beadCount){
      if (!pendingStop) return;
      const entry = pendingStop;
      entry.bead_count = safeParseInt(beadCount, 0);

      addEntry(entry);

      pendingStop = null;
      closeSheet();
      refreshTodayOnly();
      setStatus("Saved.");
    }

    sheetBackdrop.addEventListener("click", () => commitPendingWithBeads(0));
    btnBeadSave.addEventListener("click", () => commitPendingWithBeads(beadCountInput.value));
    btnBeadSkip.addEventListener("click", () => commitPendingWithBeads(0));

    // Buttons
    btnStart.addEventListener("click", () => {
      if (isRunning) return;
      if (!ensureCanStart()) return;

      isRunning = true;
      isPaused = false;
      startEpochMs = Date.now();
      pausedAccumMs = 0;
      pauseStartMs = null;

      startTicker();
      renderTimer();
      setStatus("Running");
      btnPause.textContent = "Pause";
    });

    btnPause.addEventListener("click", () => {
      if (!isRunning) return;

      if (!isPaused){
        isPaused = true;
        pauseStartMs = Date.now();
        btnPause.textContent = "Resume";
      } else {
        isPaused = false;
        const now = Date.now();
        pausedAccumMs += (now - pauseStartMs);
        pauseStartMs = null;
        btnPause.textContent = "Pause";
      }
      renderTimer();
    });

    btnStop.addEventListener("click", () => {
      if (!isRunning) return;

      const endEpoch = Date.now();
      const durationMs = elapsedMsNow();

      isRunning = false;
      isPaused = false;
      stopTicker();

      const startDate = new Date(startEpochMs);
      const endDate = new Date(endEpoch);

      pendingStop = {
        id: uuid(),
        order: orderInput.value.trim(),
        task: taskSelect.value,
        date: formatDateMMDDYYYY(endDate),
        start_time: formatTimeHHMMSS(startDate),
        end_time: formatTimeHHMMSS(endDate),
        duration_ms: Math.max(0, durationMs),
        bead_count: 0
      };

      startEpochMs = null;
      pausedAccumMs = 0;
      pauseStartMs = null;
      timerDisplay.textContent = "00:00:00";
      btnPause.textContent = "Pause";

      if (TASKS_REQUIRE_BEAD_COUNT.has(pendingStop.task)){
        openSheet();
      } else {
        commitPendingWithBeads(0);
      }
    });

    // Today summary: only “Total Time Today:” + “X hours Y minutes”
    const todayTotalEl = document.getElementById("todayTotal");

    function msToHoursMinutes(ms){
      const totalMin = Math.floor(Math.max(0, ms) / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      return `${h} hours ${m} minutes`;
    }

    function refreshTodayOnly(){
      const order = getCurrentOrder() || orderInput.value.trim();
      const today = todayMMDDYYYY();

      const entries = loadEntries();
      const todayMs = entries
        .filter(e => e.date === today && String(e.order) === String(order))
        .reduce((a,e) => a + (e.duration_ms || 0), 0);

      todayTotalEl.textContent = msToHoursMinutes(todayMs);
    }

    refreshTodayOnly();
  </script>
</body>
</html>
