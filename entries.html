<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entries</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="backdrop" id="backdrop" aria-hidden="true"></div>

  <aside class="drawer" id="drawer" aria-label="Menu">
    <div class="drawerEmoji">
      <img src="assets/emojis.png" alt="">
    </div>

    <nav class="drawerMenu">
      <a class="drawerBtn" href="index.html"><img src="assets/timer.png" alt="Timer"></a>
      <a class="drawerBtn" href="entries.html"><img src="assets/entries.png" alt="Entries"></a>
      <a class="drawerBtn" href="analytics.html"><img src="assets/analytics.png" alt="Analytics"></a>
      <a class="drawerBtn" href="export.html"><img src="assets/export.png" alt="Export"></a>
    </nav>
  </aside>

  <div class="container">

    <div class="card" style="margin-top:10px;">
      <div class="row">
        <button class="btn" id="btnMenu">Menu</button>
        <button class="btn" id="btnClearFilters">Clear</button>
      </div>

      <div class="row" style="margin-top:10px;">
        <div class="field">
          <label for="orderFilter">Order</label>
          <select id="orderFilter"></select>
        </div>

        <div class="field">
          <label for="taskFilter">Task</label>
          <select id="taskFilter"></select>
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div class="field">
          <label for="sortSelect">Sort</label>
          <select id="sortSelect">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
          </select>
        </div>
      </div>
    </div>

    <div class="list" id="entriesList" style="margin-top:12px;"></div>

  </div>

  <div class="sheetBackdrop" id="editBackdrop" aria-hidden="true"></div>
  <div class="sheet" id="editSheet" role="dialog" aria-modal="true" aria-label="Edit entry">
    <div class="sheetHandle"></div>
    <h2 class="sheetTitle">Edit</h2>

    <div class="sheetRow">
      <div class="field">
        <label for="editTask">Task</label>
        <select id="editTask"></select>
      </div>

      <div class="field">
        <label for="editStart">Start time</label>
        <input id="editStart" type="text" placeholder="3:45 PM" />
      </div>

      <div class="field">
        <label for="editEnd">End time</label>
        <input id="editEnd" type="text" placeholder="4:10 PM" />
      </div>

      <div class="field">
        <label for="editBeads">Bead count</label>
        <input id="editBeads" type="number" min="0" step="1" inputmode="numeric" />
      </div>

      <div class="sheetBtns">
        <button class="btn" id="btnEditCancel">Cancel</button>
        <button class="btn" id="btnEditSave">Save</button>
      </div>

      <p class="smallNote" id="editNote"></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    initDrawer();

    const orderFilter = document.getElementById("orderFilter");
    const taskFilter = document.getElementById("taskFilter");
    const sortSelect = document.getElementById("sortSelect");
    const btnClearFilters = document.getElementById("btnClearFilters");
    const entriesList = document.getElementById("entriesList");

    const editBackdrop = document.getElementById("editBackdrop");
    const editSheet = document.getElementById("editSheet");
    const editTask = document.getElementById("editTask");
    const editStart = document.getElementById("editStart");
    const editEnd = document.getElementById("editEnd");
    const editBeads = document.getElementById("editBeads");
    const btnEditCancel = document.getElementById("btnEditCancel");
    const btnEditSave = document.getElementById("btnEditSave");
    const editNote = document.getElementById("editNote");

    let editingId = null;

    function fillFilters() {
      const entries = loadEntries();
      const orders = uniq(
        entries.map(e => String(e.order || "").trim()).filter(Boolean)
      ).sort((a, b) => a.localeCompare(b));

      const tasks = getTasks();

      const prevOrder = orderFilter.value;
      const prevTask = taskFilter.value;

      orderFilter.innerHTML = `<option value="">All orders</option>`;
      orders.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o;
        opt.textContent = o;
        orderFilter.appendChild(opt);
      });
      if ([...orderFilter.options].some(o => o.value === prevOrder)) {
        orderFilter.value = prevOrder;
      }

      taskFilter.innerHTML = `<option value="">All tasks</option>`;
      tasks.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        taskFilter.appendChild(opt);
      });
      if ([...taskFilter.options].some(o => o.value === prevTask)) {
        taskFilter.value = prevTask;
      }

      editTask.innerHTML = "";
      tasks.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        editTask.appendChild(opt);
      });
    }

    function sortKey(e) {
      const p = parseMMDDYYYY(e.date);
      const y = p ? p.yyyy : 0;
      const m = p ? p.mm : 0;
      const d = p ? p.dd : 0;
      const t = parseHMS(e.end_time);
      const sec = t ? hmsToSeconds(t) : 0;
      return y * 1e9 + m * 1e7 + d * 1e5 + sec;
    }

    function openEdit(entry) {
      editingId = entry.id;
      editTask.value = entry.task || "";
      editStart.value = to12h(entry.start_time);
      editEnd.value = to12h(entry.end_time);
      editBeads.value = String(entry.bead_count ?? 0);
      editNote.textContent = "";

      editBackdrop.classList.add("open");
      editSheet.classList.add("open");
    }

    function closeEdit() {
      editingId = null;
      editBackdrop.classList.remove("open");
      editSheet.classList.remove("open");
    }

    function recomputeDurationMs(startHMS, endHMS) {
      const ps = parseHMS(startHMS);
      const pe = parseHMS(endHMS);
      if (!ps || !pe) return null;

      let s = hmsToSeconds(ps);
      let e = hmsToSeconds(pe);

      if (e < s) e += 86400;

      return (e - s) * 1000;
    }

    async function saveEdit() {
      const entries = loadEntries();
      const idx = entries.findIndex(e => String(e.id) === String(editingId));

      if (idx < 0) {
        editNote.textContent = "Could not find that entry.";
        return;
      }

      const task = String(editTask.value || "").trim();
      const start = parse12h(editStart.value);
      const end = parse12h(editEnd.value);
      const beads = Math.max(0, safeInt(editBeads.value, 0));

      if (!task) {
        editNote.textContent = "Choose a task.";
        return;
      }

      if (!start || !end) {
        editNote.textContent = "Use times like 3:45 PM.";
        return;
      }

      const duration = recomputeDurationMs(start, end);
      if (duration == null) {
        editNote.textContent = "Invalid time.";
        return;
      }

      entries[idx] = {
        ...entries[idx],
        task,
        start_time: start,
        end_time: end,
        bead_count: beads,
        duration_ms: duration
      };

      saveEntries(entries);

      try {
        await syncPullThenPush();
      } catch (e) {}

      closeEdit();
      fillFilters();
      render();
    }

    async function deleteEntry(id) {
      const ok = confirm("Delete this entry?");
      if (!ok) return;

      const entries = loadEntries().filter(e => String(e.id) !== String(id));
      saveEntries(entries);

      try {
        await syncPullThenPush();
      } catch (e) {}

      fillFilters();
      render();
    }

    function render() {
      let entries = loadEntries().slice();

      if (orderFilter.value) {
        entries = entries.filter(e => String(e.order || "").trim() === orderFilter.value);
      }

      if (taskFilter.value) {
        entries = entries.filter(e => String(e.task || "").trim() === taskFilter.value);
      }

      entries.sort((a, b) =>
        sortSelect.value === "oldest"
          ? sortKey(a) - sortKey(b)
          : sortKey(b) - sortKey(a)
      );

      entriesList.innerHTML = "";

      if (!entries.length) {
        entriesList.innerHTML = `<div class="card">No entries.</div>`;
        return;
      }

      entries.forEach(e => {
        const card = document.createElement("div");
        card.className = "entry";

        const left = document.createElement("div");
        left.className = "left";
        left.innerHTML = `
          <div class="main">${e.order} · ${e.task}</div>
          <div class="meta">${e.date} · ${to12h(e.start_time)} – ${to12h(e.end_time)} · ${msToHuman(e.duration_ms)} · Beads: ${e.bead_count ?? 0}</div>
        `;

        const right = document.createElement("div");
        right.className = "right";

        const editBtn = document.createElement("button");
        editBtn.className = "btn";
        editBtn.textContent = "Edit";
        editBtn.addEventListener("click", () => openEdit(e));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "btn btnDanger";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", () => deleteEntry(e.id));

        right.appendChild(editBtn);
        right.appendChild(deleteBtn);

        card.appendChild(left);
        card.appendChild(right);
        entriesList.appendChild(card);
      });
    }

    orderFilter.addEventListener("change", render);
    taskFilter.addEventListener("change", render);
    sortSelect.addEventListener("change", render);

    btnClearFilters.addEventListener("click", () => {
      orderFilter.value = "";
      taskFilter.value = "";
      sortSelect.value = "newest";
      render();
    });

    editBackdrop.addEventListener("click", closeEdit);
    btnEditCancel.addEventListener("click", closeEdit);
    btnEditSave.addEventListener("click", saveEdit);

    if (getGitHubToken()) {
      pullFromGitHub().then(() => {
        fillFilters();
        render();
      }).catch(() => {
        fillFilters();
        render();
      });
    } else {
      fillFilters();
      render();
    }
  </script>
</body>
</html>
