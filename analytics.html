<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analytics</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="backdrop" id="backdrop"></div>

<aside class="drawer" id="drawer">
  <div class="drawerEmoji">
    <img src="assets/emojis.png">
  </div>

  <nav class="drawerMenu">
    <a class="drawerBtn" href="index.html"><img src="assets/timer.png"></a>
    <a class="drawerBtn" href="entries.html"><img src="assets/entries.png"></a>
    <a class="drawerBtn" href="analytics.html"><img src="assets/analytics.png"></a>
    <a class="drawerBtn" href="export.html"><img src="assets/export.png"></a>
  </nav>
</aside>

<div class="container">

<div class="card" style="margin-top:10px">

<div class="row">
<button class="btn" id="btnMenu">Menu</button>
</div>

<div class="row" style="margin-top:10px">

<div class="field">
<label>Year</label>
<select id="yearSelect"></select>
</div>

<div class="field">
<label>Order</label>
<select id="orderSelect"></select>
</div>

</div>

</div>

<div class="card chartCard" style="margin-top:12px">

<h2 class="sectionTitle">Total Time by Task</h2>

<div id="chartRows"></div>

</div>

</div>

<script src="app.js"></script>

<script>

initDrawer()

const yearSelect=document.getElementById("yearSelect")
const orderSelect=document.getElementById("orderSelect")
const chartRows=document.getElementById("chartRows")

function fillYearOptions(entries){

const years=[...new Set(entries.map(e=>{
const p=parseMMDDYYYY(e.date)
return p?p.yyyy:null
}).filter(Boolean))].sort((a,b)=>b-a)

yearSelect.innerHTML=""

years.forEach(y=>{
const opt=document.createElement("option")
opt.value=y
opt.textContent=y
yearSelect.appendChild(opt)
})

}

function fillOrderOptions(entries,year){

const orders=[...new Set(entries
.filter(e=>parseMMDDYYYY(e.date)?.yyyy===year)
.map(e=>e.order)
.filter(Boolean))].sort()

orderSelect.innerHTML=""

orders.forEach(o=>{
const opt=document.createElement("option")
opt.value=o
opt.textContent=o
orderSelect.appendChild(opt)
})

}

function renderChart(){

const entries=loadEntries()

const year=parseInt(yearSelect.value)
const order=orderSelect.value

const tasks=getTasks()

const filtered=entries.filter(e=>{
const y=parseMMDDYYYY(e.date)?.yyyy
return y===year && e.order===order
})

const totals={}

tasks.forEach(t=>totals[t]=0)

filtered.forEach(e=>{
totals[e.task]+=Number(e.duration_ms||0)
})

const max=Math.max(...Object.values(totals),1)

chartRows.innerHTML=""

tasks.forEach(task=>{

const ms=totals[task]

if(ms<=0)return

const row=document.createElement("div")
row.className="barRow"

const percent=(ms/max)*100

row.innerHTML=`
<div class="taskLabel">${task}</div>
<div class="barTrack">
<div class="barFill" style="width:${percent}%"></div>
</div>
<div class="barValue">${msToHuman(ms)}</div>
`

chartRows.appendChild(row)

})

if(chartRows.innerHTML===""){
chartRows.innerHTML=`<div class="smallNote">No data for this order</div>`
}

}

function boot(){

const entries=loadEntries()

fillYearOptions(entries)

if(yearSelect.value){
fillOrderOptions(entries,parseInt(yearSelect.value))
}

renderChart()

}

yearSelect.addEventListener("change",()=>{
const entries=loadEntries()
fillOrderOptions(entries,parseInt(yearSelect.value))
renderChart()
})

orderSelect.addEventListener("change",renderChart)

if(getGitHubToken()){
pullFromGitHub().then(boot).catch(boot)
}else{
boot()
}

</script>

</body>
</html>
